<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iTVT - Desktop App</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #09090b;
        transition: opacity 0.35s ease;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 48px;
        font-weight: 800;
        letter-spacing: -1px;
        color: #ffffff;
        animation: splashPulse 1.5s ease-in-out infinite;
      }

      .splash-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #a81414;
        animation: splashBlink 1s ease-in-out infinite;
      }

      .splash-loading {
        display: flex;
        align-items: center;
        gap: 2px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: #a81414;
        text-transform: uppercase;
      }

      .splash-loading span {
        animation: splashBlink 1s ease-in-out infinite;
        animation-delay: calc(var(--i, 0) * 0.2s);
      }

      .splash-loading span:nth-child(2) { --i: 1; }
      .splash-loading span:nth-child(3) { --i: 2; }
      .splash-loading span:nth-child(4) { --i: 3; }

      @keyframes splashPulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.04); }
      }

      @keyframes splashBlink {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
    <script>
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); }, true);
    </script>

  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">iTVT</div>
      <div class="splash-dot"></div>
      <div class="splash-loading">
        <span>Ł</span><span>a</span><span>d</span><span>o</span><span>w</span><span>a</span><span>n</span><span>i</span><span>e</span>
      </div>
    </div>
    <div id="app"></div>
  </body>
</html>
