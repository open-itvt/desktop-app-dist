    <script>
      var ua = navigator.userAgent;
      var isApp = ua.indexOf('iTVT Desktop App') !== -1 || window.location.search.indexOf('proxy=') !== -1;

      if (window.location.pathname === '/apps') {
        // /apps page — handled by apps.html, skip everything
      } else if (isApp) {
        // Desktop app or dev mode — load splash + vue normally
      } else {
        // Browser — try to open the installed app first
        var el = document.getElementById('splash-open-text');
        if (el) el.style.display = '';
        setTimeout(function() {
          window.location.replace('https://vod.itvt.xyz');
        }, 3000);
        window.location.href = 'itvt://open';
      }
    </script>

    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
 
      #splash {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #09090b;
        transition: opacity 0.35s ease;
      }
 
      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
 
      .splash-logo {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 48px;
        font-weight: 800;
        letter-spacing: -1px;
        color: #ffffff;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
 
      .splash-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #a81414;
        animation: splashBlink 1s ease-in-out infinite;
      }
 
      .splash-loading {
        display: flex;
        align-items: center;
        gap: 2px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: #a81414;
        text-transform: uppercase;
      }
 
      .splash-loading span {
        animation: splashBlink 1s ease-in-out infinite;
        animation-delay: calc(var(--i, 0) * 0.2s);
      }
 
      .splash-loading span:nth-child(2) { --i: 1; }
      .splash-loading span:nth-child(3) { --i: 2; }
      .splash-loading span:nth-child(4) { --i: 3; }
 
      .splash-open {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: #a81414;
        margin-top: -8px;
        animation: splashBlink 1s ease-in-out infinite;
      }
 
      @keyframes splashPulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.04); }
      }
 
      @keyframes splashBlink {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
    <link rel="stylesheet" href="/offline.css" />
    <script>
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); }, true);

    function toggleOffline(force) {
      var el = document.getElementById('offline');
      if (el) {
        if (force === undefined) force = !navigator.onLine;
        if (force) el.classList.add('show');
        else el.classList.remove('show');
      }
    }

    function retryConnection() {
      toggleOffline(false);
      // Let the connectivity check re-detect state
      setTimeout(function() { toggleOffline(); }, 1000);
    }

    window.addEventListener('offline', function() { toggleOffline(true); });
    window.addEventListener('online', function() { toggleOffline(false); });

    // Initial check after Vue splash hides
    setTimeout(function() { toggleOffline(); }, 500);
  </script>
